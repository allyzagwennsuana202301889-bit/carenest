<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareNest — Senior Care Platform</title>
    <style>
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, sans-serif;
        --bg-primary: #ffffff;
        --bg-secondary: #f8f7f4;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6b6b;
        --text-tertiary: #a0a0a0;
        --border-secondary: #d4d4d4;
        --border-tertiary: #eaeaea;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--bg-secondary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        padding: 0 16px;
      }
      input {
        padding: 8px 12px;
        border: 0.5px solid var(--border-secondary);
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        background: var(--bg-primary);
        outline: none;
        width: 100%;
      }
      input:focus {
        border-color: #0f6e56;
      }
      input::placeholder {
        color: var(--text-tertiary);
      }
      button {
        cursor: pointer;
        font-family: inherit;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <base target="_blank" />
  </head>

      // ===================== MOCK API =====================
      const api = {
        getPatients: () =>

        getStaff: () =>

        toggleTask: (id) =>
          new Promise((r) =>
            setTimeout(() => {
              const t = DB.tasks.find((t) => t.id === id);
              if (t) t.done = !t.done;
              r(t);
            }, 120)
          ),
        askAI: async (patientId, question) => {
          const patient = DB.patients.find((p) => p.id === patientId);
          if (!patient) return { answer: 'Patient not found.' };
          const responses = {
            'blood pressure': `For ${patient.name}, BP is ${
              patient.vitals.bp
            }. This is ${
              patient.status === 'critical'
                ? 'concerning'
                : 'within acceptable range'
            }. Consider monitoring closely and consult the physician if trends worsen.`,
            'heart rate': `${patient.name}'s heart rate is ${
              patient.vitals.hr
            } bpm. ${
              patient.vitals.hr > 90
                ? 'This is elevated — check for pain, anxiety, or infection.'
                : 'This is within normal limits for their age group.'
            }`,
            temperature: `Current temp: ${patient.vitals.temp}°C. ${
              patient.vitals.temp > 37.5
                ? 'Slightly elevated — monitor for infection signs.'
                : 'Normal range. No action needed.'
            }`,
            oxygen: `O2 saturation at ${patient.vitals.o2}%. ${
              patient.vitals.o2 < 95
                ? 'Below optimal — consider supplemental O2 and notify physician.'
                : 'Good oxygenation levels.'
            }`,
            medication: `Review ${patient.name}'s medication chart. Current condition: ${patient.condition}. Ensure all prescribed meds are administered on schedule.`,
            condition: `${patient.name} is being treated for ${patient.condition}. Status: ${patient.status}. Assigned nurse: ${patient.nurse}. Last updated ${patient.lastUpdate}.`,
            default: `Based on ${patient.name}'s current vitals (BP ${patient.vitals.bp}, HR ${patient.vitals.hr}, Temp ${patient.vitals.temp}°C, O2 ${patient.vitals.o2}%), they appear ${patient.status}. Continue standard monitoring protocols.`,
          };
          const q = question.toLowerCase();
          let answer = responses.default;
          for (const [key, response] of Object.entries(responses)) {
            if (q.includes(key)) {
              answer = response;
              break;
            }
          }
          return new Promise((r) => setTimeout(() => r({ answer }), 800));
        },
      };

      // ===================== COMPONENTS =====================

      function Avatar({
        initials,
        size = 36,
        color = '#E1F5EE',
        textColor = '#0F6E56',
      }) {
        return (
          <div
            style={{
              width: size,
              height: size,
              borderRadius: '50%',
              background: color,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              fontWeight: 500,
              fontSize: size * 0.33,
              color: textColor,
              flexShrink: 0,
            }}
          >
            {initials}
          </div>
        );
      }

      function Badge({ label, bg, text }) {
        return (
          <span
            style={{
              background: bg,
              color: text,
              fontSize: 11,
              fontWeight: 500,
              padding: '2px 8px',
              borderRadius: 20,
              whiteSpace: 'nowrap',
            }}
          >
            {label}
          </span>
        );
      }

      function MetricCard({
        icon: Icon,
        label,
        value,
        sub,
        color = '#185FA5',
        bg = '#E6F1FB',
      }) {
        return (
          <div
            style={{
              background: 'var(--bg-secondary)',
              borderRadius: 10,
              padding: '14px 16px',
              display: 'flex',
              flexDirection: 'column',
              gap: 4,
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span
                style={{
                  background: bg,
                  color,
                  width: 30,
                  height: 30,
                  borderRadius: 8,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                }}
              >
                <Icon />
              </span>
              <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
                {label}
              </span>
            </div>
            <div
              style={{
                fontSize: 26,
                fontWeight: 500,
                color: 'var(--text-primary)',
                lineHeight: 1,
              }}
            >
              {value}
            </div>
            {sub && (
              <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>
                {sub}
              </div>
            )}
          </div>
        );
      }

      function DashboardView({
        patients,
        tasks,
        alerts,
        staff,
        onSelectPatient,
      }) {
        const critical = patients.filter((p) => p.status === 'critical').length;
        const alertCount = patients.filter((p) => p.status === 'alert').length;
        const pendingTasks = tasks.filter((t) => !t.done).length;
        const activeStaff = staff.filter((s) => s.status !== 'off').length;

        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))',
                gap: 12,
              }}
            >
              <MetricCard
                icon={Icons.Users}
                label="Patients"
                value={patients.length}
                sub="in care today"
              />
              <MetricCard
                icon={Icons.AlertTriangle}
                label="Critical"
                value={critical}
                sub="need attention"
                color="#A32D2D"
                bg="#FCEBEB"
              />
              <MetricCard
                icon={Icons.Bell}
                label="Alerts"
                value={alerts.length}
                sub="active"

                <div
                  style={{ display: 'flex', flexDirection: 'column', gap: 8 }}

        const filtered =
          filter === 'all'
            ? patients
            : patients.filter((p) => p.status === filter);
        return (
          <div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              {['all', 'stable', 'alert', 'critical'].map((s) => (
                <button
                  key={s}
                  onClick={() => setFilter(s)}
                  style={{
                    fontSize: 12,
                    padding: '5px 14px',
                    borderRadius: 20,
                    border:
                      filter === s
                        ? 'none'
                        : '0.5px solid var(--border-secondary)',
                    background:
                      filter === s ? 'var(--text-primary)' : 'transparent',
                    color:
                      filter === s
                        ? 'var(--bg-primary)'
                        : 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                >
                  {s.charAt(0).toUpperCase() + s.slice(1)}

                const sc = statusColor[p.status];

                  <div
                    key={p.id}

                    style={{
                      background: 'var(--bg-primary)',
                      border: '0.5px solid var(--border-tertiary)',

                      padding: '14px 16px',
                      display: 'flex',
                      alignItems: 'center',

                          display: 'flex',
                          alignItems: 'center',
                          gap: 8,

                            fontSize: 15,
                            fontWeight: 500,

                          }}
                        >
                          {p.name}
                        </span>
                        <Badge label={p.status} bg={sc.bg} text={sc.text} />
                      </div>
                      <p
                        style={{
                          margin: 0,
                          fontSize: 12,
                          color: 'var(--text-secondary)',

                      >

                          margin: 0,
                          fontSize: 13,

      function PatientDetailView({ patient, tasks, onBack, onAskAI }) {
        const [aiQuestion, setAiQuestion] = useState('');
        const [aiAnswer, setAiAnswer] = useState('');
        const [aiLoading, setAiLoading] = useState(false);
        const patientTasks = tasks.filter((t) => t.patientId === patient.id);
        const sc = statusColor[patient.status];

        const handleAsk = async () => {
          if (!aiQuestion.trim()) return;
          setAiLoading(true);
          setAiAnswer('');
          const res = await onAskAI(patient.id, aiQuestion);
          setAiAnswer(res.answer);
          setAiLoading(false);
        };

        return (
          <div>
            <button
              onClick={onBack}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 6,
                background: 'none',
                border: 'none',
                color: 'var(--text-secondary)',
                cursor: 'pointer',
                fontSize: 13,
                marginBottom: 16,
                padding: 0,
              }}
            >
              <Icons.ArrowLeft /> Back to patients
            </button>

            <div
              style={{
                background: 'var(--bg-primary)',
                border: '0.5px solid var(--border-tertiary)',
                borderRadius: 14,
                padding: '18px 20px',
                marginBottom: 16,
              }}
            >
              <div
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: 14,
                  marginBottom: 16,
                }}
              >
                <Avatar
                  initials={patient.avatar}
                  size={52}
                  color={sc.bg}
                  textColor={sc.text}
                />
                <div>
                  <div
                    style={{ display: 'flex', alignItems: 'center', gap: 10 }}
                  >
                    <span
                      style={{
                        fontSize: 18,
                        fontWeight: 500,
                        color: 'var(--text-primary)',
                      }}
                    >
                      {patient.name}
                    </span>
                    <Badge label={patient.status} bg={sc.bg} text={sc.text} />
                  </div>
                  <p
                    style={{
                      margin: 0,
                      fontSize: 13,
                      color: 'var(--text-secondary)',
                    }}
                  >
                    {patient.room} · Age {patient.age} · {patient.condition}
                  </p>
                  <p
                    style={{
                      margin: 0,
                      fontSize: 12,
                      color: 'var(--text-tertiary)',
                    }}
                  >
                    Assigned nurse: {patient.nurse} · Updated{' '}
                    {patient.lastUpdate}
                  </p>
                </div>
              </div>

              <p
                style={{
                  fontSize: 12,
                  fontWeight: 500,
                  color: 'var(--text-secondary)',
                  marginBottom: 10,
                }}
              >
                Current vitals
              </p>
              <div
                style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(4, 1fr)',
                  gap: 10,
                }}
              >
                {[
                  {
                    label: 'Blood pressure',
                    value: patient.vitals.bp,
                    unit: 'mmHg',
                    icon: Icons.Activity,
                  },
                  {
                    label: 'Heart rate',
                    value: patient.vitals.hr,
                    unit: 'bpm',
                    icon: Icons.HeartPulse,
                  },
                  {
                    label: 'Temperature',
                    value: patient.vitals.temp,
                    unit: '°C',
                    icon: Icons.Thermometer,
                  },
                  {
                    label: 'O2 saturation',
                    value: patient.vitals.o2,
                    unit: '%',
                    icon: Icons.Lungs,
                  },
                ].map((v) => {
                  const VIcon = v.icon;
                  return (
                    <div
                      key={v.label}
                      style={{
                        background: 'var(--bg-secondary)',
                        borderRadius: 8,
                        padding: '10px 12px',
                      }}
                    >
                      <VIcon />
                      <p
                        style={{
                          margin: '4px 0 0',
                          fontSize: 20,
                          fontWeight: 500,
                          color: 'var(--text-primary)',
                        }}
                      >
                        {v.value}
                        <span
                          style={{
                            fontSize: 11,
                            color: 'var(--text-secondary)',
                            marginLeft: 3,
                          }}
                        >
                          {v.unit}
                        </span>
                      </p>
                      <p
                        style={{
                          margin: 0,
                          fontSize: 11,
                          color: 'var(--text-tertiary)',
                        }}
                      >
                        {v.label}
                      </p>
                    </div>
                  );
                })}
              </div>
            </div>

            {patientTasks.length > 0 && (
              <div style={{ marginBottom: 16 }}>
                <p
                  style={{
                    fontSize: 13,
                    fontWeight: 500,
                    color: 'var(--text-secondary)',
                    marginBottom: 8,
                  }}
                >
                  Care tasks
                </p>
                {patientTasks.map((t) => {
                  const pc = priorityColor[t.priority];
                  return (
                    <div
                      key={t.id}
                      style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: 10,
                        padding: '8px 0',
                        borderBottom: '0.5px solid var(--border-tertiary)',
                      }}
                    >
                      {t.done ? (
                        <Icons.CircleCheck color="#3B6D11" />
                      ) : (
                        <Icons.Circle color="var(--text-tertiary)" />
                      )}
                      <span
                        style={{
                          flex: 1,
                          fontSize: 13,
                          color: t.done
                            ? 'var(--text-tertiary)'
                            : 'var(--text-primary)',
                          textDecoration: t.done ? 'line-through' : 'none',
                        }}
                      >
                        {t.text}
                      </span>
                      <Badge label={t.priority} bg={pc.bg} text={pc.text} />
                      <span
                        style={{ fontSize: 11, color: 'var(--text-tertiary)' }}
                      >
                        {t.due}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}

            <div
              style={{
                background: 'var(--bg-secondary)',
                borderRadius: 12,
                padding: '14px 16px',
              }}
            >
              <div
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: 8,
                  marginBottom: 12,
                }}
              >
                <Icons.Robot />
                <span
                  style={{
                    fontSize: 13,
                    fontWeight: 500,
                    color: 'var(--text-primary)',
                  }}
                >
                  AI clinical assistant
                </span>
                <Badge label="Mock AI" bg="#EEEDFE" text="#534AB7" />
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <input
                  value={aiQuestion}
                  onChange={(e) => setAiQuestion(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && handleAsk()}
                  placeholder={`Ask about ${patient.name.split(' ')[0]}...`}
                />
                <button
                  onClick={handleAsk}
                  disabled={aiLoading || !aiQuestion.trim()}
                  style={{
                    fontSize: 13,
                    padding: '0 16px',
                    borderRadius: 8,
                    border: '0.5px solid var(--border-secondary)',
                    background: '#534AB7',
                    color: '#fff',
                    cursor: aiLoading ? 'default' : 'pointer',
                    opacity: aiLoading ? 0.6 : 1,
                    whiteSpace: 'nowrap',
                  }}
                >
                  {aiLoading ? '...' : 'Ask'}
                </button>
              </div>
              {aiAnswer && (
                <div
                  style={{
                    marginTop: 12,
                    background: 'var(--bg-primary)',
                    borderRadius: 8,
                    padding: '10px 14px',
                    border: '0.5px solid #CECBF6',
                  }}
                >
                  <p
                    style={{
                      margin: 0,
                      fontSize: 13,
                      color: 'var(--text-primary)',
                      lineHeight: 1.6,
                    }}
                  >
                    {aiAnswer}
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      }

      function TasksView({ tasks, patients, onToggle }) {
        const pending = tasks.filter((t) => !t.done);
        const done = tasks.filter((t) => t.done);

        const TaskRow = ({ t }) => {
          const pc = priorityColor[t.priority];
          const patient = patients.find((p) => p.id === t.patientId);
          return (
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 12,
                padding: '10px 0',
                borderBottom: '0.5px solid var(--border-tertiary)',
              }}
            >
              <button
                onClick={() => onToggle(t.id)}
                style={{
                  background: 'none',
                  border: 'none',
                  cursor: 'pointer',
                  padding: 0,
                  lineHeight: 0,
                }}
              >
                {t.done ? (
                  <Icons.CircleCheck color="#3B6D11" />
                ) : (
                  <Icons.Circle color="var(--text-tertiary)" />
                )}
              </button>
              <div style={{ flex: 1 }}>
                <p
                  style={{
                    margin: 0,
                    fontSize: 13,
                    color: t.done
                      ? 'var(--text-tertiary)'
                      : 'var(--text-primary)',
                    textDecoration: t.done ? 'line-through' : 'none',
                  }}
                >
                  {t.text}
                </p>
                {patient && (
                  <p
                    style={{
                      margin: 0,
                      fontSize: 11,
                      color: 'var(--text-tertiary)',
                    }}
                  >
                    {patient.name} · {patient.room}
                  </p>
                )}
              </div>
              <Badge label={t.priority} bg={pc.bg} text={pc.text} />
              <span
                style={{
                  fontSize: 12,
                  color: 'var(--text-secondary)',
                  minWidth: 56,
                  textAlign: 'right',
                }}
              >
                {t.due}
              </span>
            </div>
          );
        };

        return (
          <div>
            <p
              style={{
                fontSize: 13,
                fontWeight: 500,
                color: 'var(--text-secondary)',
                marginBottom: 8,
              }}
            >
              Pending ({pending.length})
            </p>
            {pending.map((t) => (
              <TaskRow key={t.id} t={t} />
            ))}
            {done.length > 0 && (
              <>
                <p
                  style={{
                    fontSize: 13,
                    fontWeight: 500,
                    color: 'var(--text-secondary)',
                    marginTop: 20,
                    marginBottom: 8,
                  }}
                >
                  Completed ({done.length})
                </p>
                {done.map((t) => (
                  <TaskRow key={t.id} t={t} />
                ))}
              </>
            )}
          </div>
        );
      }

      function StaffView({ staff }) {
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {staff.map((s) => {
              const sc = staffStatusColor[s.status];
              return (
                <div
                  key={s.id}
                  style={{
                    background: 'var(--bg-primary)',
                    border: '0.5px solid var(--border-tertiary)',
                    borderRadius: 12,
                    padding: '14px 16px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: 14,
                  }}
                >
                  <Avatar
                    initials={s.avatar}
                    size={42}
                    color={sc.bg}
                    textColor={sc.text}
                  />
                  <div style={{ flex: 1 }}>
                    <div
                      style={{ display: 'flex', gap: 8, alignItems: 'center' }}
                    >
                      <span
                        style={{
                          fontSize: 15,
                          fontWeight: 500,
                          color: 'var(--text-primary)',
                        }}
                      >
                        {s.name}
                      </span>
                      <Badge label={s.status} bg={sc.bg} text={sc.text} />
                    </div>
                    <p
                      style={{
                        margin: 0,
                        fontSize: 12,
                        color: 'var(--text-secondary)',
                      }}
                    >
                      {s.role} · {s.shift} shift

                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <p

                        margin: 0,
                        fontSize: 22,

                      }}
                    >
                      {s.patients}

                    <p

                        margin: 0,

                      patients

      // ===================== MAIN APP =====================
      function App() {
        const [view, setView] = useState('dashboard');
        const [patients, setPatients] = useState([]);
        const [tasks, setTasks] = useState([]);
        const [staff, setStaff] = useState([]);
        const [alerts, setAlerts] = useState([]);
        const [loading, setLoading] = useState(true);
        const [selected, setSelected] = useState(null);

        useEffect(() => {
          (async () => {
            const [p, t, s, a] = await Promise.all([
              api.getPatients(),
              api.getTasks(),
              api.getStaff(),
              api.getAlerts(),
            ]);
            setPatients(p);
            setTasks(t);
            setStaff(s);
            setAlerts(a);
            setLoading(false);
          })();
        }, []);

        const toggleTask = useCallback(async (id) => {
          await api.toggleTask(id);
          setTasks((prev) =>
            prev.map((t) => (t.id === id ? { ...t, done: !t.done } : t))
          );
        }, []);

        const handleSelectPatient = useCallback((p) => {
          setSelected(p);
          setView('patient-detail');
        }, []);

        const navItems = [
          { id: 'dashboard', icon: Icons.LayoutDashboard, label: 'Dashboard' },
          { id: 'patients', icon: Icons.Users, label: 'Patients' },
          {
            id: 'tasks',
            icon: Icons.ClipboardList,
            label: 'Tasks',
            badge: tasks.filter((t) => !t.done).length,
          },
          { id: 'staff', icon: Icons.Stethoscope, label: 'Staff' },
        ];

        if (loading)
          return (
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                minHeight: 400,
                color: 'var(--text-secondary)',
                fontSize: 14,
              }}
            >
              <Icons.Loader2 /> Loading CareNest...
            </div>
          );

        const criticalCount = alerts.filter(
          (a) => a.type === 'critical'
        ).length;

        return (
          <div
            style={{
              fontFamily: 'var(--font-sans)',
              maxWidth: 720,
              margin: '0 auto',
            }}
          >
            <h2 className="sr-only">
              CareNest — Senior Care Management Platform
            </h2>

            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                marginBottom: 20,
                padding: '16px 0',
                borderBottom: '0.5px solid var(--border-tertiary)',
              }}
            >
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div
                  style={{
                    width: 36,
                    height: 36,
                    borderRadius: 10,
                    background: '#E1F5EE',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                  }}
                >
                  <Icons.Heart />
                </div>
                <div>
                  <p
                    style={{
                      margin: 0,
                      fontSize: 17,
                      fontWeight: 500,
                      color: 'var(--text-primary)',
                    }}
                  >
                    CareNest
                  </p>
                  <p
                    style={{
                      margin: 0,
                      fontSize: 11,
                      color: 'var(--text-tertiary)',
                    }}
                  >
                    Senior Care Platform
                  </p>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {criticalCount > 0 && (
                  <div
                    style={{ position: 'relative', cursor: 'pointer' }}
                    onClick={() => setView('dashboard')}
                  >
                    <Icons.Bell />
                    <span
                      style={{
                        position: 'absolute',
                        top: -4,
                        right: -4,
                        background: '#E24B4A',
                        color: '#fff',
                        fontSize: 10,
                        fontWeight: 500,
                        width: 16,
                        height: 16,
                        borderRadius: '50%',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                      }}
                    >
                      {criticalCount}
                    </span>
                  </div>
                )}
                <Avatar
                  initials="AN"
                  size={34}
                  color="#EEEDFE"
                  textColor="#534AB7"
                />
              </div>
            </div>

            <nav style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
              {navItems.map((n) => {
                const active =
                  view === n.id ||
                  (view === 'patient-detail' && n.id === 'patients');
                const NavIcon = n.icon;
                return (
                  <button
                    key={n.id}
                    onClick={() => {
                      setView(n.id);
                      setSelected(null);
                    }}
                    style={{
                      flex: 1,
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      gap: 4,
                      padding: '8px 4px',
                      background: active
                        ? 'var(--bg-secondary)'
                        : 'transparent',
                      border: 'none',
                      borderRadius: 10,
                      cursor: 'pointer',
                      position: 'relative',
                    }}
                  >
                    {n.badge > 0 && (
                      <span
                        style={{
                          position: 'absolute',
                          top: 4,
                          right: 'calc(50% - 14px)',
                          background: '#E24B4A',
                          color: '#fff',
                          fontSize: 10,
                          fontWeight: 500,
                          minWidth: 16,
                          height: 16,
                          borderRadius: 8,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center',
                          padding: '0 4px',
                        }}
                      >
                        {n.badge}
                      </span>
                    )}
                    <NavIcon />
                    <span
                      style={{
                        fontSize: 11,
                        color: active ? '#0F6E56' : 'var(--text-secondary)',
                        fontWeight: active ? 500 : 400,
                      }}
                    >
                      {n.label}
                    </span>
                  </button>
                );
              })}
            </nav>

            <div>
              {view === 'dashboard' && (
                <DashboardView
                  patients={patients}
                  tasks={tasks}
                  alerts={alerts}
                  staff={staff}
                  onSelectPatient={handleSelectPatient}
                />
              )}
              {view === 'patients' && (
                <PatientsView
                  patients={patients}
                  onSelectPatient={handleSelectPatient}
                />
              )}
              {view === 'patient-detail' && selected && (
                <PatientDetailView
                  patient={selected}
                  tasks={tasks}
                  onBack={() => setView('patients')}
                  onAskAI={api.askAI}
                />
              )}
              {view === 'tasks' && (
                <TasksView
                  tasks={tasks}
                  patients={patients}
                  onToggle={toggleTask}
                />
              )}
              {view === 'staff' && <StaffView staff={staff} />}
            </div>
          </div>
        );
      }

      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
